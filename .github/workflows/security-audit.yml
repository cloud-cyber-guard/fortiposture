name: Monthly Security Audit

on:
  schedule:
    - cron: "0 9 1 * *"  # 1st of every month at 9am UTC
  workflow_dispatch:       # manual trigger

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project and audit tools
        run: |
          pip install . bandit pip-audit

      - name: Run pip-audit (dependencies)
        id: pip_audit
        continue-on-error: true
        run: |
          pip-audit --strict --desc 2>&1 | tee audit-results.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Run Bandit (source code)
        id: bandit
        continue-on-error: true
        run: |
          bandit -r fortiposture/ -ll -f txt 2>&1 | tee bandit-results.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Open issue if vulnerabilities found
        if: steps.pip_audit.outcome == 'failure' || steps.bandit.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## Monthly Security Audit\n\n';

            if ('${{ steps.pip_audit.outcome }}' === 'failure') {
              const audit = fs.readFileSync('audit-results.txt', 'utf8');
              body += '### Dependency vulnerabilities (pip-audit)\n\n```\n' + audit + '\n```\n\n';
            }

            if ('${{ steps.bandit.outcome }}' === 'failure') {
              const bandit = fs.readFileSync('bandit-results.txt', 'utf8');
              body += '### Source code issues (Bandit)\n\n```\n' + bandit + '\n```\n\n';
            }

            // Check for existing open audit issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'security-audit',
              state: 'open',
            });

            if (issues.data.length > 0) {
              // Update existing issue instead of creating duplicates
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Security audit flagged vulnerabilities',
                body: body,
                labels: ['security-audit'],
              });
            }
