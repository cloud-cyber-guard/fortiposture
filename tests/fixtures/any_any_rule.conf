config system global
    set hostname "fw-any-any-01"
end
config firewall address
    edit "all"
        set uuid 00000000-0000-0000-0000-000000000000
    next
end
config firewall policy
    edit 1
        set name "permit-all"
        set srcintf "any"
        set dstintf "any"
        set srcaddr "all"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "ALL"
        set logtraffic all
        set status enable
    next
    edit 2
        set name "web-traffic"
        set srcintf "internal"
        set dstintf "wan1"
        set srcaddr "all"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "ALL"
        set logtraffic all
        set status enable
    next
end
