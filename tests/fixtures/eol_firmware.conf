config system global
    set hostname "fw-eol-01"
    set firmware-version "FortiOS v6.4.9"
end
config firewall address
    edit "all"
    next
end
config firewall service custom
    edit "ALL"
    next
end
config firewall policy
    edit 1
        set name "deny-all"
        set srcintf "any"
        set dstintf "any"
        set srcaddr "all"
        set dstaddr "all"
        set action deny
        set schedule "always"
        set service "ALL"
        set logtraffic all
        set status enable
    next
end
