config system global
    set hostname "fw-mgmt-exposed-01"
end
config system interface
    edit "wan1"
        set ip 203.0.113.1 255.255.255.0
        set allowaccess "https" "ssh"
        set status up
    next
    edit "wan2-http"
        set ip 198.51.100.5 255.255.255.0
        set allowaccess "http" "https"
        set status up
    next
    edit "internal"
        set ip 192.168.1.1 255.255.255.0
        set allowaccess "https" "ping"
        set status up
    next
end
config firewall address
    edit "all"
    next
end
config firewall policy
    edit 1
        set name "deny-all"
        set srcintf "any"
        set dstintf "any"
        set srcaddr "all"
        set dstaddr "all"
        set action deny
        set schedule "always"
        set service "ALL"
        set logtraffic all
        set status enable
    next
end
