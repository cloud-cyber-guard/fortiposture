config system global
    set hostname "fw-geoblock-unused-01"
end
config firewall address
    edit "China"
        set type geography
        set country "CN"
    next
    edit "Russia"
        set type geography
        set country "RU"
    next
    edit "net-internal"
        set type ipmask
        set subnet 10.0.0.0 255.0.0.0
    next
    edit "all"
    next
end
config firewall service custom
    edit "ALL"
    next
end
config firewall policy
    edit 1
        set name "allow-from-china"
        set srcintf "wan1"
        set dstintf "internal"
        set srcaddr "China"
        set dstaddr "net-internal"
        set action accept
        set schedule "always"
        set service "ALL"
        set logtraffic all
        set status enable
    next
    edit 2
        set name "deny-all"
        set srcintf "any"
        set dstintf "any"
        set srcaddr "all"
        set dstaddr "all"
        set action deny
        set schedule "always"
        set service "ALL"
        set logtraffic all
        set status enable
    next
end
