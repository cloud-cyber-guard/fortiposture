#config-version=FGT100D-v6.4.8-FW-build1914-211115:opmode=0:vdom=1:user=admin
config global
    set hostname "fw-vdom-01"
end
config vdom
    edit root
        config firewall address
            edit "net-root-internal"
                set type ipmask
                set subnet 10.0.0.0 255.255.0.0
            next
            edit "all"
                set uuid 00000000-0000-0000-0000-000000000000
            next
        end
        config firewall service custom
            edit "HTTPS"
                set tcp-portrange 443
            next
        end
        config firewall policy
            edit 1
                set name "root-allow-web"
                set srcintf "internal"
                set dstintf "wan1"
                set srcaddr "net-root-internal"
                set dstaddr "all"
                set action accept
                set schedule "always"
                set service "HTTPS"
                set logtraffic all
                set status enable
            next
            edit 2
                set name "root-deny-all"
                set srcintf "any"
                set dstintf "any"
                set srcaddr "all"
                set dstaddr "all"
                set action deny
                set schedule "always"
                set service "HTTPS"
                set logtraffic all
                set status enable
            next
        end
    next
    edit dmz
        config firewall address
            edit "net-dmz-servers"
                set type ipmask
                set subnet 172.16.0.0 255.255.0.0
            next
            edit "all"
                set uuid 00000000-0000-0000-0000-000000000000
            next
        end
        config firewall service custom
            edit "HTTP"
                set tcp-portrange 80
            next
        end
        config firewall policy
            edit 1
                set name "dmz-allow-web"
                set srcintf "dmz"
                set dstintf "wan1"
                set srcaddr "net-dmz-servers"
                set dstaddr "all"
                set action accept
                set schedule "always"
                set service "HTTP"
                set logtraffic all
                set status enable
            next
            edit 2
                set name "dmz-deny-all"
                set srcintf "any"
                set dstintf "any"
                set srcaddr "all"
                set dstaddr "all"
                set action deny
                set schedule "always"
                set service "HTTP"
                set logtraffic all
                set status enable
            next
        end
    next
end
