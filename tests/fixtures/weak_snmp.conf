config system global
    set hostname "fw-weak-snmp-01"
end
config system snmp sysinfo
    set status enable
end
config system snmp community
    edit 1
        set name "public"
        set status enable
        config hosts
            edit 1
                set ip 10.0.0.0 255.0.0.0
            next
        end
    next
    edit 2
        set name "monitoring"
        set status enable
    next
end
config firewall address
    edit "all"
    next
end
config firewall service custom
    edit "ALL"
    next
end
config firewall policy
    edit 1
        set name "deny-all"
        set srcintf "any"
        set dstintf "any"
        set srcaddr "all"
        set dstaddr "all"
        set action deny
        set schedule "always"
        set service "ALL"
        set logtraffic all
        set status enable
    next
end
