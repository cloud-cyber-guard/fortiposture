config system global
    set hostname "fw-weakadmin-01"
end
config system admin
    edit "admin"
        set accprofile "super_admin"
        set password ENC SomeEncryptedHash==
    next
    edit "readonly"
        set accprofile "read_only"
        set password ENC AnotherHash==
    next
end
config firewall policy
    edit 1
        set name "deny-all"
        set srcintf "any"
        set dstintf "any"
        set srcaddr "all"
        set dstaddr "all"
        set action deny
        set schedule "always"
        set service "ALL"
        set logtraffic all
        set status enable
    next
end
