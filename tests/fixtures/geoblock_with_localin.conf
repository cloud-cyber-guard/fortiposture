config system global
    set hostname "fw-geoblock-localin-01"
end
config vpn ssl settings
    set status enable
    set port 10443
end
config firewall address
    edit "BlockedCountries"
        set type geography
        set country "CN"
    next
    edit "all"
    next
end
config firewall local-in-policy
    edit 1
        set intf "wan1"
        set srcaddr "BlockedCountries"
        set dstaddr "all"
        set action deny
        set schedule "always"
        set status enable
    next
end
config firewall service custom
    edit "ALL"
    next
end
config firewall policy
    edit 1
        set name "deny-blocked-countries"
        set srcintf "wan1"
        set dstintf "any"
        set srcaddr "BlockedCountries"
        set dstaddr "all"
        set action deny
        set schedule "always"
        set service "ALL"
        set logtraffic all
        set status enable
    next
    edit 2
        set name "deny-all"
        set srcintf "any"
        set dstintf "any"
        set srcaddr "all"
        set dstaddr "all"
        set action deny
        set schedule "always"
        set service "ALL"
        set logtraffic all
        set status enable
    next
end
