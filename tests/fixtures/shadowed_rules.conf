config system global
    set hostname "fw-shadowed-01"
end
config firewall address
    edit "net-10-broad"
        set type ipmask
        set subnet 10.0.0.0 255.0.0.0
    next
    edit "net-10-narrow"
        set type ipmask
        set subnet 10.1.0.0 255.255.0.0
    next
    edit "all"
        set uuid 00000000-0000-0000-0000-000000000000
    next
end
config firewall service custom
    edit "HTTP"
        set tcp-portrange 80
    next
end
config firewall policy
    edit 1
        set name "broad-rule"
        set srcintf "internal"
        set dstintf "wan1"
        set srcaddr "net-10-broad"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "HTTP"
        set logtraffic all
        set status enable
    next
    edit 2
        set name "narrow-rule-shadowed"
        set srcintf "internal"
        set dstintf "wan1"
        set srcaddr "net-10-narrow"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "HTTP"
        set logtraffic all
        set status enable
    next
    edit 3
        set name "deny-all"
        set srcintf "any"
        set dstintf "any"
        set srcaddr "all"
        set dstaddr "all"
        set action deny
        set schedule "always"
        set service "ALL"
        set logtraffic all
        set status enable
    next
end
