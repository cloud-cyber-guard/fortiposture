config system global
    set hostname "fw-nodeny-01"
end
config firewall address
    edit "net-internal"
        set type ipmask
        set subnet 10.0.0.0 255.0.0.0
    next
    edit "all"
        set uuid 00000000-0000-0000-0000-000000000000
    next
end
config firewall service custom
    edit "HTTP"
        set tcp-portrange 80
    next
    edit "HTTPS"
        set tcp-portrange 443
    next
end
config firewall policy
    edit 1
        set name "allow-web"
        set srcintf "internal"
        set dstintf "wan1"
        set srcaddr "net-internal"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "HTTP" "HTTPS"
        set logtraffic all
        set status enable
    next
    edit 2
        set name "allow-dns"
        set srcintf "internal"
        set dstintf "wan1"
        set srcaddr "net-internal"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "ALL"
        set logtraffic all
        set status enable
    next
end
