config system global
    set hostname "fw-weak-vpn-01"
end
config vpn ipsec phase1-interface
    edit "vpn-to-branch"
        set interface "wan1"
        set ike-version 1
        set peertype any
        set proposal "3des-md5"
        set dhgrp 2
        set remote-gw 198.51.100.1
        set psksecret ENC XXXX
    next
end
config vpn ipsec phase2-interface
    edit "vpn-to-branch-p2"
        set phase1name "vpn-to-branch"
        set proposal "des-sha1"
    next
end
config firewall address
    edit "all"
    next
end
config firewall service custom
    edit "ALL"
    next
end
config firewall policy
    edit 1
        set name "deny-all"
        set srcintf "any"
        set dstintf "any"
        set srcaddr "all"
        set dstaddr "all"
        set action deny
        set schedule "always"
        set service "ALL"
        set logtraffic all
        set status enable
    next
end
