#config-version=FGT60F-v7.2.4-FW-build1396-230131:opmode=0:vdom=0:user=admin
config system global
    set hostname "fw-clean-01"
    set timezone 04
end
config system password-policy
    set status enable
    set minimum-length 12
    set must-contain upper-case lower-case number non-alphanumeric
end
config system admin
    edit "admin"
        set trusthost1 10.10.10.0 255.255.255.0
        set accprofile "super_admin"
        set two-factor fortitoken
        set fortitoken "FTKMOB0000000001"
        set password ENC SomeEncryptedPasswordHash==
    next
end
config log syslogd setting
    set status enable
    set server "192.168.1.100"
    set port 514
    set facility local7
    set source-ip ''
    set format default
end
config firewall address
    edit "net-internal"
        set type ipmask
        set subnet 10.0.0.0 255.0.0.0
    next
    edit "net-dmz"
        set type ipmask
        set subnet 172.16.0.0 255.255.0.0
    next
    edit "all"
        set uuid 00000000-0000-0000-0000-000000000000
    next
end
config firewall service custom
    edit "HTTP"
        set tcp-portrange 80
    next
    edit "HTTPS"
        set tcp-portrange 443
    next
    edit "DNS"
        set udp-portrange 53
        set tcp-portrange 53
    next
end
config firewall policy
    edit 1
        set name "allow-web-outbound"
        set srcintf "internal"
        set dstintf "wan1"
        set srcaddr "net-internal"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "HTTP" "HTTPS"
        set logtraffic all
        set status enable
        set nat enable
    next
    edit 2
        set name "allow-dns-outbound"
        set srcintf "internal"
        set dstintf "wan1"
        set srcaddr "net-internal"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "DNS"
        set logtraffic all
        set status enable
    next
    edit 3
        set name "allow-dmz-to-internal"
        set srcintf "dmz"
        set dstintf "internal"
        set srcaddr "net-dmz"
        set dstaddr "net-internal"
        set action accept
        set schedule "always"
        set service "HTTPS"
        set logtraffic all
        set status enable
    next
    edit 4
        set name "deny-all"
        set srcintf "any"
        set dstintf "any"
        set srcaddr "all"
        set dstaddr "all"
        set action deny
        set schedule "always"
        set service "ALL"
        set logtraffic all
        set status enable
    next
end
