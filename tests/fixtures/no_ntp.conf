config system global
    set hostname "fw-no-ntp-01"
end
config system admin
    edit "admin"
        set accprofile "super_admin"
        set two-factor fortitoken
        set fortitoken "FTKMOB0000000001"
        set trusthost1 10.10.10.0 255.255.255.0
    next
end
config firewall address
    edit "all"
    next
end
config firewall service custom
    edit "ALL"
    next
end
config firewall policy
    edit 1
        set name "deny-all"
        set srcintf "any"
        set dstintf "any"
        set srcaddr "all"
        set dstaddr "all"
        set action deny
        set schedule "always"
        set service "ALL"
        set logtraffic all
        set status enable
    next
end
