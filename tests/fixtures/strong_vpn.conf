config system global
    set hostname "fw-strong-vpn-01"
end
config vpn ipsec phase1-interface
    edit "vpn-to-hq"
        set interface "wan1"
        set ike-version 2
        set peertype any
        set proposal "aes256-sha256"
        set dhgrp 14
        set remote-gw 203.0.113.1
        set psksecret ENC XXXX
    next
end
config vpn ipsec phase2-interface
    edit "vpn-to-hq-p2"
        set phase1name "vpn-to-hq"
        set proposal "aes256-sha256"
    next
end
config firewall address
    edit "all"
    next
end
config firewall service custom
    edit "ALL"
    next
end
config firewall policy
    edit 1
        set name "deny-all"
        set srcintf "any"
        set dstintf "any"
        set srcaddr "all"
        set dstaddr "all"
        set action deny
        set schedule "always"
        set service "ALL"
        set logtraffic all
        set status enable
    next
end
