#config-version=FGT60E-v6.4.9-FW-build2225-221222:opmode=0:vdom=0:user=admin
config system global
    set hostname "fw-branch-02"
    set admin-sport 443
    set timezone 10
end
config system password-policy
    set status disable
end
config system admin
    edit "admin"
        set accprofile "super_admin"
        set password ENC SomeEncryptedHash==
    next
    edit "helpdesk"
        set accprofile "prof_admin"
        set password ENC AnotherHash==
    next
end
config system interface
    edit "wan1"
        set vdom "root"
        set type physical
        set allowaccess ping https ssh http
    next
    edit "internal"
        set vdom "root"
        set type physical
        set allowaccess ping https ssh
    next
end
config system snmp community
    edit 1
        set name "public"
        set status enable
    next
end
config firewall address
    edit "net-internal"
        set type ipmask
        set subnet 192.168.10.0 255.255.255.0
    next
    edit "all"
        set uuid 00000000-0000-0000-0000-000000000000
    next
end
config firewall service custom
    edit "HTTP"
        set tcp-portrange 80
    next
    edit "HTTPS"
        set tcp-portrange 443
    next
    edit "RDP"
        set tcp-portrange 3389
    next
    edit "FTP"
        set tcp-portrange 21
    next
    edit "DNS"
        set udp-portrange 53
        set tcp-portrange 53
    next
end
config vpn ipsec phase1-interface
    edit "branch-vpn"
        set interface "wan1"
        set proposal 3des-md5
        set dhgrp 2
        set remote-gw 203.0.113.50
        set psksecret ENC VpnSecretHash==
    next
end
config vpn ipsec phase2-interface
    edit "branch-vpn-p2"
        set phase1name "branch-vpn"
        set proposal 3des-md5
        set dhgrp 2
    next
end
config firewall policy
    edit 1
        set name "allow-all-outbound"
        set srcintf "internal"
        set dstintf "wan1"
        set srcaddr "all"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "ALL"
        set logtraffic none
        set status enable
        set nat enable
    next
    edit 2
        set name "allow-rdp-inbound"
        set srcintf "wan1"
        set dstintf "internal"
        set srcaddr "all"
        set dstaddr "net-internal"
        set action accept
        set schedule "always"
        set service "RDP"
        set logtraffic all
        set status enable
    next
    edit 3
        set name "old-ftp-rule"
        set srcintf "internal"
        set dstintf "wan1"
        set srcaddr "net-internal"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "FTP"
        set logtraffic all
        set status disable
    next
end
