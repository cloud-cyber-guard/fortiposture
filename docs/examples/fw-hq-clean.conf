#config-version=FGT100F-v7.2.8-FW-build1639-240822:opmode=0:vdom=0:user=admin
config system global
    set hostname "fw-hq-01"
    set timezone 04
end
config system ntp
    set ntpsync enable
    set server-mode disable
    config ntpserver
        edit 1
            set server "time.google.com"
        next
        edit 2
            set server "time.cloudflare.com"
        next
    end
end
config system password-policy
    set status enable
    set minimum-length 14
    set must-contain upper-case lower-case number non-alphanumeric
end
config system admin
    edit "admin"
        set trusthost1 10.10.10.0 255.255.255.0
        set accprofile "super_admin"
        set two-factor fortitoken
        set fortitoken "FTKMOB0000000001"
        set password ENC SomeEncryptedPasswordHash==
    next
    edit "auditor"
        set trusthost1 10.10.10.50 255.255.255.255
        set accprofile "read_only"
        set two-factor fortitoken
        set fortitoken "FTKMOB0000000002"
        set password ENC AnotherEncryptedHash==
    next
end
config system interface
    edit "wan1"
        set vdom "root"
        set type physical
        set allowaccess ping https
    next
    edit "internal"
        set vdom "root"
        set type physical
        set allowaccess ping https ssh
    next
end
config log syslogd setting
    set status enable
    set server "192.168.1.100"
    set port 514
    set facility local7
end
config log fortianalyzer setting
    set status enable
    set server "192.168.1.200"
end
config firewall address
    edit "net-internal"
        set type ipmask
        set subnet 10.0.0.0 255.0.0.0
    next
    edit "net-servers"
        set type ipmask
        set subnet 172.16.1.0 255.255.255.0
    next
    edit "geo-blocked-countries"
        set type geography
        set country "RU" "CN" "KP" "IR"
    next
    edit "all"
        set uuid 00000000-0000-0000-0000-000000000000
    next
end
config firewall service custom
    edit "HTTP"
        set tcp-portrange 80
    next
    edit "HTTPS"
        set tcp-portrange 443
    next
    edit "DNS"
        set udp-portrange 53
        set tcp-portrange 53
    next
end
config firewall policy
    edit 1
        set name "block-geo-inbound"
        set srcintf "wan1"
        set dstintf "internal"
        set srcaddr "geo-blocked-countries"
        set dstaddr "all"
        set action deny
        set schedule "always"
        set service "ALL"
        set logtraffic all
        set status enable
    next
    edit 2
        set name "allow-web-outbound"
        set srcintf "internal"
        set dstintf "wan1"
        set srcaddr "net-internal"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "HTTP" "HTTPS"
        set logtraffic all
        set status enable
        set nat enable
    next
    edit 3
        set name "allow-dns-outbound"
        set srcintf "internal"
        set dstintf "wan1"
        set srcaddr "net-internal"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "DNS"
        set logtraffic all
        set status enable
    next
    edit 4
        set name "deny-all"
        set srcintf "any"
        set dstintf "any"
        set srcaddr "all"
        set dstaddr "all"
        set action deny
        set schedule "always"
        set service "ALL"
        set logtraffic all
        set status enable
    next
end
